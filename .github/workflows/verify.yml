name: verify

on:
  push:
    branches:
      - main
  pull_request:

permissions:
  contents: read

jobs:
  verify:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22.x
          cache: npm
          cache-dependency-path: |
            package-lock.json
            client/package-lock.json
      - run: npm ci
      - run: npm --prefix client ci
      - run: npm run test:backend
      - run: npm run test:frontend
      - run: npm run build
        env:
          # CRA promotes the documented legacy warnings to errors under CI=true.
          # Compilation errors still fail while warning cleanup remains incremental.
          CI: "false"
